<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BxCM Pitch Lab</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="appShell">
    <div class="topBar">
      <div class="titleBlock">
        <p class="eyebrow">BxCM Jr. Sluggers Academy</p>
        <h1>Pitch Lab</h1>
        <p class="sub">Load your arm, throw forward, hit the glowing zone.</p>
      </div>

      <div class="controls">
        <select id="cameraSelect" aria-label="Choose camera"></select>
        <button id="startBtn" type="button">Start Camera</button>
        <button id="resetBtn" class="secondary" type="button">Reset Game</button>
      </div>
    </div>

    <div class="mainGrid">
      <aside class="sidePanel">
        <div class="panelTag">Player Silhouette</div>

        <div class="videoWrap">
          <video id="webcam" autoplay playsinline muted></video>
          <canvas id="overlay"></canvas>
          <div class="videoTint"></div>
        </div>

        <div class="statusCard">
          <p id="status">Press Start Camera to begin.</p>
        </div>
      </aside>

      <section id="gamePanel">
        <div class="gameCanvasWrap">
          <canvas id="gameCanvas" width="1365" height="768"></canvas>
        </div>
      </section>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
