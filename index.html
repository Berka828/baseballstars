<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BxCM Pitch Lab</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="appShell">

    <div class="topBar">
      <div class="brandBlock">
        <div class="eyebrow">BXCM JR. SLUGGERS ACADEMY</div>
        <h1>Pitch Lab</h1>
        <p>Load your arm, throw forward, hit the zone.</p>
      </div>

      <div class="controls">
        <button id="startBtn">Start Camera</button>
        <button id="resetBtn" class="secondary">Reset Game</button>
      </div>
    </div>

    <div class="mainGrid">

      <!-- LEFT PANEL -->
      <div class="posePanel">
        <div class="panelTitle">Player Silhouette</div>

        <div class="videoWrap">
          <video id="webcam" autoplay playsinline muted></video>
          <canvas id="overlay"></canvas>
          <div class="videoTint"></div>
        </div>

        <div id="status">
          Move your throwing hand into the blue box.
        </div>
      </div>

      <!-- RIGHT PANEL -->
      <div class="gamePanel">
        <div class="panelTitle">Pitch Field</div>
        <canvas id="gameCanvas" width="1400" height="820"></canvas>
      </div>

    </div>
  </div>

  <!-- LIBRARIES -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>

  <!-- GAME SCRIPT -->
  <script src="app.js"></script>
</body>
</html>
