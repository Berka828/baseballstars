<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />
  <title>BxCM Pitch Simulation</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <canvas id="gameCanvas"></canvas>

    <div id="hud">
      <div class="hud-left">
        <div class="panel">
          <div class="label">SCORE</div>
          <div id="scoreValue" class="value">0</div>
        </div>
        <div class="panel">
          <div class="label">THROWS</div>
          <div id="throwsValue" class="value">0 / 10</div>
        </div>
      </div>

      <div class="hud-center">
        <div id="message">Aim for Pelham’s target zones!</div>
      </div>

      <div class="hud-right">
        <button id="startBtn">START</button>
        <button id="resetBtn">RESET</button>
      </div>
    </div>

    <div id="overlay">
      <div id="overlayCard">
        <h1>BxCM Pitch Challenge</h1>
        <p>Throw toward Pelham and hit different target spots for points.</p>
        <p>More zones. More reactions. More arcade feel.</p>
        <button id="overlayStartBtn">PLAY</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
